<form onsubmit="login(event, this.username.value, this.password.value)">
    <div class="inline-form-row">
        <div>
            <label>Name</label>
            <input id="username-input" class="input-medium" name="username" required>
        </div>
        <div class="login-field">
            <label>Password</label>
            <input id="password-input" class="input-medium" name="password" type="password" required>
        </div>
    </div>
    <button id="login-button" type="submit">Login</button>
</form>
