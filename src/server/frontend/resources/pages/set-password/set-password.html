<p>Your Username: <strong>{{$.Data.Username}}</strong></p>

<form onsubmit="setPassword(event, this.password.value)">
    <label>Your new password:</label>
    <input class="password-input" type="password" name="password" placeholder="enter password..." required>
    <div>
        <button class="set-password-button" type="submit">Set Password</button>
    </div>
</form>

<p id="success-msg" style="display:none; color:green; margin-top:1rem;">
    Password was set successfully. You can now <a href="{{ $.Paths.FrontendLogin }}">log in</a>.
</p>
